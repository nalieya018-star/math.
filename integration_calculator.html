<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definite Integral Calculator</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Math.js for parsing and evaluating mathematical functions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <!-- Plotly.js for high-quality graphing and shading -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Math input font */
        .math-font { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-blue-200 selection:text-blue-900">

    <main class="max-w-5xl mx-auto p-4 md:p-8 flex flex-col gap-6 items-center">
        
        <!-- Header -->
        <header class="text-center w-full mb-2">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-slate-900">Integration Calculator</h1>
            <p class="text-slate-500 mt-2">Visualize and calculate definite integrals instantly.</p>
        </header>

        <div class="w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Control Panel -->
            <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col gap-6">
                
                <!-- Function Input -->
                <div>
                    <label for="functionInput" class="block text-sm font-semibold text-slate-700 mb-1">
                        Function <span class="text-blue-600 italic">f(x)</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500 italic">
                            f(x) = 
                        </div>
                        <input type="text" id="functionInput" value="x^2 * sin(x)" 
                            class="math-font w-full pl-14 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-lg"
                            placeholder="e.g. x^2 + 2x">
                    </div>
                    <p id="errorText" class="text-red-500 text-xs mt-2 hidden">Invalid mathematical expression.</p>
                </div>

                <!-- Bounds Inputs -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="lowerBound" class="block text-sm font-semibold text-slate-700 mb-1">
                            Lower Bound <span class="italic">(a)</span>
                        </label>
                        <input type="number" id="lowerBound" value="-3" step="any"
                            class="math-font w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label for="upperBound" class="block text-sm font-semibold text-slate-700 mb-1">
                            Upper Bound <span class="italic">(b)</span>
                        </label>
                        <input type="number" id="upperBound" value="3" step="any"
                            class="math-font w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <!-- Results Display -->
                <div class="mt-auto pt-6 border-t border-slate-100">
                    <p class="text-sm font-semibold text-slate-500 mb-2 uppercase tracking-wider">Result</p>
                    <div class="bg-blue-50 text-blue-900 rounded-xl p-4 flex items-center justify-center border border-blue-100">
                        <div class="text-2xl font-medium flex items-center gap-2">
                            <span class="text-3xl font-light text-blue-400">∫</span>
                            <span id="resultValue" class="math-font font-bold">0.0000</span>
                        </div>
                    </div>
                </div>
                
                <div class="text-xs text-slate-400 text-center">
                    Supports: sin, cos, tan, log, exp, ^ (power), pi, e
                </div>
            </div>

            <!-- Graph Panel -->
            <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative min-h-[400px] flex items-center justify-center">
                <div id="plot" class="w-full h-full absolute inset-0"></div>
            </div>

        </div>
    </main>

    <script>
        // DOM Elements
        const functionInput = document.getElementById('functionInput');
        const lowerBoundInput = document.getElementById('lowerBound');
        const upperBoundInput = document.getElementById('upperBound');
        const resultValue = document.getElementById('resultValue');
        const errorText = document.getElementById('errorText');
        const plotDiv = document.getElementById('plot');

        // Initial Plotly setup layout
        const layout = {
            margin: { t: 40, r: 20, b: 40, l: 40 },
            showlegend: false,
            hovermode: 'closest',
            paper_bgcolor: 'transparent',
            plot_bgcolor: 'transparent',
            xaxis: {
                zeroline: true,
                zerolinecolor: '#94a3b8',
                zerolinewidth: 2,
                gridcolor: '#e2e8f0',
                title: 'x',
            },
            yaxis: {
                zeroline: true,
                zerolinecolor: '#94a3b8',
                zerolinewidth: 2,
                gridcolor: '#e2e8f0',
                title: 'f(x)',
            }
        };

        const config = {
            responsive: true,
            displayModeBar: false // Keep the UI clean like Desmos
        };

        // Initialize empty plot
        Plotly.newPlot(plotDiv, [], layout, config);

        // Numerical Integration using Simpson's 1/3 Rule
        function integrate(compiledFunc, a, b, n = 1000) {
            // Ensure n is even for Simpson's rule
            if (n % 2 !== 0) n++; 
            
            let h = (b - a) / n;
            let sum = compiledFunc.evaluate({ x: a }) + compiledFunc.evaluate({ x: b });

            for (let i = 1; i < n; i += 2) {
                sum += 4 * compiledFunc.evaluate({ x: a + i * h });
            }
            for (let i = 2; i < n - 1; i += 2) {
                sum += 2 * compiledFunc.evaluate({ x: a + i * h });
            }

            return (h / 3) * sum;
        }

        // Main update function
        function updateCalculator() {
            const funcStr = functionInput.value;
            const a = parseFloat(lowerBoundInput.value);
            const b = parseFloat(upperBoundInput.value);

            // Validation
            if (isNaN(a) || isNaN(b)) return;

            let compiledFunc;
            try {
                // Compile the math expression to executable code
                compiledFunc = math.compile(funcStr);
                // Test evaluation to catch syntax errors immediately
                compiledFunc.evaluate({x: 0}); 
                
                errorText.classList.add('hidden');
                functionInput.classList.remove('border-red-500', 'focus:ring-red-500');
                functionInput.classList.add('border-slate-300', 'focus:ring-blue-500');
            } catch (err) {
                errorText.classList.remove('hidden');
                functionInput.classList.remove('border-slate-300', 'focus:ring-blue-500');
                functionInput.classList.add('border-red-500', 'focus:ring-red-500');
                return; // Stop execution if function is invalid
            }

            // 1. Calculate Area (Integral)
            // Handle if lower bound is greater than upper bound (reverses the sign)
            let area;
            if (a > b) {
                area = -integrate(compiledFunc, b, a);
            } else {
                area = integrate(compiledFunc, a, b);
            }
            
            // Format result to handle extremely small numbers or standard display
            if (Math.abs(area) < 1e-10) area = 0; 
            resultValue.textContent = Number.isInteger(area) ? area : area.toFixed(4);

            // 2. Generate Graph Data
            // Determine plot window (margin outside the bounds)
            const range = Math.abs(b - a) || 4; // default range if a==b
            const margin = range * 0.4;
            const xMin = Math.min(a, b) - margin;
            const xMax = Math.max(a, b) + margin;
            
            const numPoints = 500;
            const step = (xMax - xMin) / numPoints;

            const curveX = [];
            const curveY = [];
            const shadedX = [];
            const shadedY = [];

            for (let x = xMin; x <= xMax; x += step) {
                let y;
                try {
                    y = compiledFunc.evaluate({x: x});
                } catch (e) {
                    y = null; // Handle division by zero etc
                }

                curveX.push(x);
                curveY.push(y);

                // Collect points for the shaded area (between a and b)
                if (x >= Math.min(a, b) && x <= Math.max(a, b)) {
                    shadedX.push(x);
                    shadedY.push(y);
                }
            }

            // Ensure exact boundary points are included in the shaded region for clean edges
            try { shadedX.unshift(Math.min(a, b)); shadedY.unshift(compiledFunc.evaluate({x: Math.min(a, b)})); } catch(e){}
            try { shadedX.push(Math.max(a, b)); shadedY.push(compiledFunc.evaluate({x: Math.max(a, b)})); } catch(e){}


            // 3. Render Plot
            const traceCurve = {
                x: curveX,
                y: curveY,
                type: 'scatter',
                mode: 'lines',
                line: { color: '#3b82f6', width: 3 }, // Blue-500
                name: 'f(x)'
            };

            const traceShaded = {
                x: shadedX,
                y: shadedY,
                fill: 'tozeroy',
                type: 'scatter',
                mode: 'none', // No border line, just the fill
                fillcolor: 'rgba(59, 130, 246, 0.25)', // Blue-500 with opacity
                name: 'Area'
            };

            Plotly.react(plotDiv, [traceShaded, traceCurve], layout, config);
        }

        // Add event listeners for real-time updates
        const inputs = [functionInput, lowerBoundInput, upperBoundInput];
        inputs.forEach(input => {
            input.addEventListener('input', updateCalculator);
        });

        // Initial calculation on load
        updateCalculator();

    </script>
</body>
</html>
